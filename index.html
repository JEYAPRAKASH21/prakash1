<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Project</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #ddd;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #00c6ff;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 DevOps CI/CD Pipeline</h1>
        <p>Deployed using Jenkins + Docker + GitHub Webhook</p>

        <button class="btn" onclick="showMessage()">Click Me</button>
    </div>

    <footer>
        © 2026 Prakash | Jenkins Project
    </footer>

    <script>
        function showMessage() {
            alert("🔥 Pipeline is working perfectly!");
        }
    </script>

</body>
</html>
